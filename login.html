<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Coscharis</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* CSS Variables */
    :root {
      --primary-color: #2563eb;
      --primary-dark: #1d4ed8;
      --secondary-color: #f59e0b;
      --success-color: #10b981;
      --danger-color: #ef4444;
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-300: #d1d5db;
      --gray-400: #9ca3af;
      --gray-500: #6b7280;
      --gray-600: #4b5563;
      --gray-800: #1f2937;
      --gray-900: #111827;
      --white: #ffffff;
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
      --radius: 0.5rem;
      --radius-xl: 1rem;
      --transition: all 0.3s ease;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      line-height: 1.6;
      color: var(--gray-800);
    }

    /* Auth Page Layout */
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
      padding: 2rem;
    }

    .auth-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      max-width: 1000px;
      width: 100%;
      background: var(--white);
      border-radius: var(--radius-xl);
      overflow: hidden;
      box-shadow: var(--shadow-xl);
    }

    /* Left Side - Image */
    .auth-image {
      background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?w=800');
      background-size: cover;
      background-position: center;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 3rem;
      color: white;
    }

    .auth-image h2 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }

    .auth-image p {
      font-size: 1.125rem;
      opacity: 0.95;
      line-height: 1.6;
    }

    /* Right Side - Form */
    .auth-form-wrapper {
      padding: 3rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .auth-logo i {
      font-size: 3.5rem;
      color: var(--primary-color);
      margin-bottom: 0.5rem;
    }

    .auth-logo h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--gray-900);
    }

    /* Form Elements */
    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      color: var(--gray-700);
      font-size: 0.875rem;
    }

    .form-input {
      width: 100%;
      padding: 0.875rem 1rem;
      border: 2px solid var(--gray-200);
      border-radius: var(--radius);
      font-size: 1rem;
      transition: var(--transition);
      font-family: inherit;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .form-input::placeholder {
      color: var(--gray-400);
    }

    /* Input with Icon */
    .input-icon-wrapper {
      position: relative;
    }

    .input-icon-wrapper i {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray-400);
      font-size: 1rem;
    }

    .input-icon-wrapper .form-input {
      padding-left: 2.75rem;
    }

    /* Password Toggle - CSS Only using Checkbox Hack */
    .password-wrapper {
      position: relative;
    }

    .password-toggle-checkbox {
      display: none;
    }

    .password-toggle {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray-400);
      cursor: pointer;
      background: none;
      border: none;
      padding: 0.5rem;
      font-size: 1rem;
      transition: var(--transition);
    }

    .password-toggle:hover {
      color: var(--gray-600);
    }

    /* Show/Hide Password Logic */
    #passwordToggle:checked ~ .password-input {
      -webkit-text-security: none;
    }

    .password-input {
      -webkit-text-security: disc;
    }

    /* Form Options */
    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      font-size: 0.875rem;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      color: var(--gray-600);
    }

    .remember-me input[type="checkbox"] {
      width: 1rem;
      height: 1rem;
      accent-color: var(--primary-color);
      cursor: pointer;
    }

    .forgot-password {
      color: var(--primary-color);
      text-decoration: none;
      font-weight: 500;
      transition: var(--transition);
    }

    .forgot-password:hover {
      text-decoration: underline;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.875rem 1.5rem;
      border-radius: var(--radius);
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: var(--transition);
      border: none;
      font-size: 0.875rem;
      font-family: inherit;
    }

    .btn-primary {
      background: var(--primary-color);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .btn-outline {
      background: transparent;
      border: 2px solid var(--gray-300);
      color: var(--gray-700);
    }

    .btn-outline:hover {
      border-color: var(--primary-color);
      color: var(--primary-color);
      background: rgba(37, 99, 235, 0.05);
    }

    .auth-submit {
      width: 100%;
      padding: 1rem;
      font-size: 1rem;
    }

    /* Divider */
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 2rem 0;
      color: var(--gray-500);
      font-size: 0.875rem;
    }

    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--gray-200);
    }

    /* Social Login */
    .social-login {
      display: flex;
      gap: 1rem;
    }

    .social-btn {
      flex: 1;
      padding: 0.875rem;
      border: 2px solid var(--gray-200);
      border-radius: var(--radius);
      background: white;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-weight: 500;
      color: var(--gray-700);
      text-decoration: none;
      font-size: 0.875rem;
    }

    .social-btn:hover {
      border-color: var(--primary-color);
      background: rgba(37, 99, 235, 0.05);
      color: var(--primary-color);
      transform: translateY(-2px);
    }

    .social-btn i {
      font-size: 1.125rem;
    }

    /* Auth Footer */
    .auth-footer {
      text-align: center;
      margin-top: 2rem;
      color: var(--gray-600);
      font-size: 0.875rem;
    }

    .auth-footer p {
      margin-bottom: 0.5rem;
    }

    .auth-footer a {
      color: var(--primary-color);
      font-weight: 600;
      text-decoration: none;
      transition: var(--transition);
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }

    /* Modal - Using CSS Target */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: var(--transition);
      z-index: 2000;
      padding: 1rem;
    }

    .modal-overlay:target {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      background: white;
      border-radius: var(--radius-xl);
      width: 100%;
      max-width: 450px;
      box-shadow: var(--shadow-xl);
      transform: scale(0.9);
      transition: var(--transition);
    }

    .modal-overlay:target .modal {
      transform: scale(1);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem;
      border-bottom: 1px solid var(--gray-200);
    }

    .modal-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--gray-900);
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 1.5rem;
      color: var(--gray-400);
      cursor: pointer;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: var(--transition);
      text-decoration: none;
    }

    .modal-close:hover {
      background: var(--gray-100);
      color: var(--gray-600);
    }

    .modal-body {
      padding: 1.5rem;
    }

    .modal-body > p {
      margin-bottom: 1rem;
      color: var(--gray-600);
      line-height: 1.5;
    }

    .modal-footer {
      display: flex;
      gap: 1rem;
      padding: 1.5rem;
      border-top: 1px solid var(--gray-200);
      justify-content: flex-end;
    }

    .modal-footer .btn {
      padding: 0.625rem 1.25rem;
    }

    /* Backdrop close area */
    .modal-backdrop {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: -1;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .auth-container {
        grid-template-columns: 1fr;
        max-width: 450px;
      }

      .auth-image {
        display: none;
      }

      .auth-form-wrapper {
        padding: 2rem;
      }

      .social-login {
        flex-direction: column;
      }
    }

    @media (max-width: 480px) {
      .auth-page {
        padding: 1rem;
      }

      .form-options {
        flex-direction: column;
        gap: 1rem;
        align-items: flex-start;
      }
    }

    /* Utility Classes */
    .text-center {
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-container">
      <!-- Left Side - Image -->
      <div class="auth-image">
        <h2>Welcome Back!</h2>
        <p>Sign in to access your account, manage your bids, and track your purchases.</p>
      </div>

      <!-- Right Side - Form -->
      <div class="auth-form-wrapper">
        <div class="auth-logo">
        <img src="./img/download (1).jpg" width="200px" alt="">
        </div>

        <!-- User Login Form -->
        <form action="customer-dashboard.html" method="GET" class="auth-form active">
          <div class="form-group">
            <label class="form-label" for="userEmail">Email Address</label>
            <div class="input-icon-wrapper">
              <i class="fas fa-envelope"></i>
              <input type="email" id="userEmail" name="email" class="form-input" placeholder="Enter your email" required>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="userPassword">Password</label>
            <div class="input-icon-wrapper password-wrapper">
              <i class="fas fa-lock"></i>
              <input type="password" id="userPassword" name="password" class="form-input password-input" placeholder="Enter your password" required>
            </div>
          </div>

          <div class="form-options">
            <label class="remember-me">
              <input type="checkbox" name="remember" id="rememberMe">
              <span>Remember me</span>
            </label>
            <a href="#forgotModal" class="forgot-password">Forgot password?</a>
          </div>

          <button type="submit" class="btn btn-primary auth-submit">
            <i class="fas fa-sign-in-alt"></i> Sign In
          </button>
        </form>

        <!-- Divider -->
        <div class="auth-divider">
          <span>Or continue with</span>
        </div>

        <!-- Social Login -->
        <div class="social-login">
          <a href="#" class="social-btn" title="Sign in with Google">
            <i class="fab fa-google"></i>
            <span>Google</span>
          </a>
          <a href="#" class="social-btn" title="Sign in with Facebook">
            <i class="fab fa-facebook-f"></i>
            <span>Facebook</span>
          </a>
        </div>

        <div class="auth-footer">
          <p>Don't have an account? <a href="signup.html">Sign up now</a></p>
          <p><a href="index.html"><i class="fas fa-arrow-left"></i> Back to Home</a></p>
        </div>
      </div>
    </div>
  </div>

  <!-- Forgot Password Modal - Using CSS Target -->
  <div id="forgotModal" class="modal-overlay">
    <a href="#" class="modal-backdrop"></a>
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">Reset Password</h3>
        <a href="#" class="modal-close">&times;</a>
      </div>
      <form action="#" method="POST">
        <div class="modal-body">
          <p>Enter your email address and we'll send you a link to reset your password.</p>
          <div class="form-group">
            <label class="form-label" for="resetEmail">Email Address</label>
            <input type="email" id="resetEmail" name="resetEmail" class="form-input" placeholder="your@email.com" required>
          </div>
        </div>
        <div class="modal-footer">
          <a href="#" class="btn btn-outline">Cancel</a>
          <button type="submit" class="btn btn-primary">Send Reset Link</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
